<!DOCTYPE html>
<html>
<head>
    <title>News NLP Analyzer</title>
</head>
<body>
    <h1>News NLP Analyzer</h1>
    <form action="/" method="POST" enctype="multipart/form-data">
        <label>Select input type:</label><br>
        <input type="radio" name="input_type" value="manual" checked> Manual Text<br>
        <input type="radio" name="input_type" value="file"> Upload File<br>
        <input type="radio" name="input_type" value="url"> URL<br><br>

        <div id="manual_input">
            <textarea name="manual_text" rows="10" cols="60" placeholder="Enter your news article here..."></textarea>
        </div>

        <div id="file_input" style="display:none;">
            <input type="file" name="file">
        </div>

        <div id="url_input" style="display:none;">
            <input type="text" name="url" placeholder="Enter article URL">
        </div><br>

        <input type="submit" value="Analyze">
    </form>

    <script>
        const radios = document.querySelectorAll('input[name="input_type"]');
        const manual = document.getElementById('manual_input');
        const file = document.getElementById('file_input');
        const url = document.getElementById('url_input');

        radios.forEach(radio => {
            radio.addEventListener('change', () => {
                manual.style.display = radio.value === 'manual' ? 'block' : 'none';
                file.style.display = radio.value === 'file' ? 'block' : 'none';
                url.style.display = radio.value === 'url' ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
